services:
  - type: web
    name: xiaoran-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./xiaoran.db
      - key: SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: doubao
      - key: DOUBAO_API_KEY
        sync: false
      - key: DOUBAO_ENDPOINT_ID
        value: ep-20260525135551-dzzvn
